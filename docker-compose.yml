services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-server
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-5591}:11434" # custom port → internal 11434
    volumes:
      - ./models:/root/.ollama # persist models biar gak re-download
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-0.0.0.0}
    # GPU support (uncomment kalau ada NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Optional: pull model otomatis saat startup
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      - ollama
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull llama3.1:8b
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"
